"$schema" = "https://starship.rs/config-schema.json"

format = """
[î‚¶](red)\
$os\
$hostname\
[î‚°](bg:peach fg:red)\
$directory\
${custom.dir_end}\
$git_branch$git_status\
$line_break\
$character"""

right_format = """
[î‚¶](fg:surface1)\
$status\
$cmd_duration\
$memory_usage\
$package\
$c\
$rust\
$golang\
$nodejs\
$bun\
$php\
$java\
$kotlin\
$haskell\
$python\
$ruby\
$swift\
$conda\
${custom.azfunc}\
$aws\
$azure\
$time\
$sudo\
[î‚´](fg:surface1)"""

add_newline = true
command_timeout = 3000
palette = "catppuccin_mocha"

[os]
disabled = false
style = "bg:red fg:crust"

[os.symbols]
Macos = "َ°€µ"
Windows = "îœڈ"
Ubuntu = "َ°•ˆ"
Linux = "َ°Œ½"
Arch = "َ°£‡"

[hostname]
ssh_only = false
format = "[ $hostname ]($style)"
style = "bg:red fg:crust"


[directory]
style = "bg:peach fg:crust"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "â€¦/"

[directory.substitutions]
Documents = "َ°ˆ™ "
Downloads = "ï€™ "
Music = "َ°‌ڑ "
Pictures = "ï€¾ "
Developer = "َ°²‹ "


[git_branch]
symbol = "ïگˆ ïگک "
style = "bg:yellow"
ignore_bare_repo = true
format = '[[î‚°](fg:peach bg:yellow)[ $symbol$branch](fg:crust bg:yellow)]($style)'


[git_status]
style = "bg:yellow fg:crust"
format = "[ $all_status$ahead_behind ]($style)[î‚´](fg:yellow)"
conflicted = "="
ahead = "â†‘"
behind = "â†“"
untracked = "?"
stashed = "َ°†”"
modified = "!"
staged = "+"
deleted = "-"


[status]
style = 'bg:surface1 fg:blue'
success_symbol = "ô€†… "
symbol = "ô€†„"
format = "[ $symbol $common_meaning $signal_name]($style)"
map_symbol = true
disabled = false

[sudo]
disabled = false
symbol = "âڑ، "
style = "bg:surface1 bold yellow"


[nodejs]
symbol = "îœک"
style = "bg:surface1"
format = "[ $symbol $version ]($style fg:green)"

[bun]
symbol = "î‌¯"
style = "bg:surface1"
format = "[ $symbol $version ]($style fg:peach)"

[c]
symbol = "îک‍"
style = "bg:surface1"
format = "[ $symbol $version ]($style fg:sky)"

[rust]
symbol = "َ±ک—"
style = "bg:surface1"
format = "[ $symbol $version ]($style fg:peach)"

[golang]
symbol = "îک§"
style = "bg:surface1"
format = "[ $symbol $version ]($style fg:teal)"

[php]
symbol = "îکˆ"
style = "bg:surface1"
format = "[ $symbol $version ]($style fg:mauve)"

[java]
symbol = "î‰–"
style = "bg:surface1"
format = "[ $symbol $version ]($style fg:flamingo)"

[kotlin]
symbol = "îک´"
style = "bg:surface1"
format = "[ $symbol $version ]($style fg:mauve)"

[haskell]
symbol = "îکں"
style = "bg:surface1"
format = "[ $symbol $version ]($style fg:lavender)"

[python]
symbol = "îک†"
style = "bg:surface1"
format = "[ $symbol $version (ï ں $virtualenv) ]($style fg:yellow)"

[swift]
symbol = "î‌•"
style = "bg:surface1"
detect_extensions = ['swift']
detect_files = ['Package.swift']
format = "[ $symbol $version ]($style fg:red)"

[docker_context]
symbol = "ïŒˆ"
style = "bg:sapphire"
format = "[ $symbol $context ]($style fg:crust)"

[conda]
symbol = " ï„Œ "
style = "bg:sapphire fg:crust"
format = "[ $symbol$environment ](bg:surface1 fg:sapphire)"
ignore_base = false

[time]
disabled = false
time_format = "%R"
style = "bg:surface1"
format = "[ ïگ؛ $time ]($style fg:lavender)"

[cmd_duration]
min_time = 500
style = "bg:surface1 fg:yellow"
format = "[ âڈ± $duration ]($style)"

[package]
disabled = false
style = "bg:sapphire fg:crust"
format = "[ ًں“¦ $version ](bg:surface1 fg:sapphire)"

[character]
success_symbol = "[â‌¯](bold fg:green)"
error_symbol = "[â‌¯](bold fg:red)"


# Claude Code statusline
# Cost pill is self-contained so its caps disappear when cost is below threshold
[profiles]
claude-code = "[î‚¶](lavender)$claude_model[î‚°](bg:surface1 fg:lavender)$claude_context${custom.statusline_git}[î‚´](fg:surface1)$claude_cost"

[claude_model]
format = "[$symbol$model ]($style)"
symbol = "ًں¤– "
style = "bg:lavender fg:crust"
model_aliases = {"claude-opus-4-7" = "opus 4.7", "claude-sonnet-4-6" = "sonnet 4.6", "claude-haiku-4-5-20251001" = "haiku 4.5", "claude-opus-4-5" = "opus 4.5", "claude-sonnet-4-5" = "sonnet 4.5"}

[claude_context]
format = "[ $percentage $gauge $input_tokens ]($style)"
gauge_width = 4
gauge_full_symbol = "â–°"
gauge_partial_symbol = ""
gauge_empty_symbol = "â–±"

[[claude_context.display]]
threshold = 0
style = "bg:surface1 fg:blue"

[[claude_context.display]]
threshold = 60
style = "bg:surface1 fg:yellow"

[[claude_context.display]]
threshold = 80
style = "bg:surface1 fg:red"

# Caps live inside the format - they vanish when cost is hidden
[claude_cost]
format = " [î‚¶](mauve)[\\$$cost ]($style)[î‚´](fg:mauve)"

[[claude_cost.display]]
threshold = 0.0
hidden = true

[[claude_cost.display]]
threshold = 0.10
style = "bg:mauve fg:crust"

[custom.statusline_git]
command = 'git rev-parse --abbrev-ref HEAD 2>/dev/null || echo "?"'
when = 'git rev-parse --is-inside-work-tree 2>/dev/null'
format = "[ ïگˆ $output ]($style)"
style = "bg:surface1 fg:green"
shell = ["bash", "--norc"]

[ruby]
symbol = "î‍‘"
style = "bg:surface1"
format = "[ $symbol $version ]($style fg:maroon)"

[memory_usage]
disabled = false
threshold = -1
symbol = "َ°چ›"
style = "bg:surface1"
format = "[ $symbol ${ram_pct} ]($style fg:mauve)"

[aws]
symbol = "َ°¸ڈ"
style = "bg:surface1"
format = "[ $symbol $profile(\\($region\\)) ]($style fg:peach)"

[azure]
symbol = "َ° …"
style = "bg:surface1"
format = "[ $symbol $subscription ]($style fg:blue)"
disabled = false

[custom.azfunc]
command = "func --version 2>/dev/null | head -1"
when = "test -f host.json"
symbol = "âڑ،"
style = "bg:surface1"
format = "[ $symbol $output ]($style fg:yellow)"
shell = ["bash", "--norc"]

[custom.dir_end]
command = 'echo 1'
when = '! git rev-parse --is-inside-work-tree 2>/dev/null'
format = "[î‚´](fg:peach)"
shell = ["bash", "--norc"]

